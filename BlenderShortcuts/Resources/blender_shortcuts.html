<title>Blender 快捷键查询</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.header{position:sticky;top:0;z-index:10;background:#16213e;padding:14px 16px;border-bottom:1px solid #2a2a4a}
.header h1{font-size:18px;font-weight:700;color:#E67E22;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.search-box{display:flex;align-items:center;background:#222244;border-radius:10px;padding:6px 12px;border:1px solid #333366;transition:border .2s}
.search-box:focus-within{border-color:#E67E22}
.search-box input{flex:1;background:none;border:none;color:#e0e0e0;font-size:15px;padding:6px 0;outline:none}
.search-box input::placeholder{color:#555}
.cats,.hists{display:flex;flex-wrap:wrap;gap:4px;padding:6px 16px 0;overflow-x:auto}
.cats button,.hists button{background:#222244;color:#999;border:none;border-radius:14px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.cats button:hover,.hists button:hover{color:#fff;background:#333366}
.cats button.active{background:#E67E22;color:#fff}
.hists button{background:#2a2a4a;color:#aaa}
.hists button:hover{background:#E67E22;color:#fff}
.hists button.clear{color:#E74C3C;background:none;border:1px solid #444;padding:3px 10px}
.meta{padding:8px 16px;font-size:11px;color:#666;border-bottom:1px solid #2a2a4a;display:flex;justify-content:space-between}
.results{max-width:720px;margin:0 auto;padding:8px}
.card{background:#16213e;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #4A90D9;transition:background .15s}
.card:hover{background:#1e2a50}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card .name{font-size:15px;font-weight:600;color:#fff}
.card .key{background:#0f3460;color:#46b5d1;padding:2px 8px;border-radius:5px;font-size:13px;font-family:'SF Mono',Menlo,monospace;font-weight:600;white-space:nowrap;margin-left:8px}
.card .tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.card .tag{font-size:10px;padding:1px 6px;border-radius:3px}
.card .tag-cat{color:#aaa;background:#222244}
.card .tag-mode{color:#888;background:#2a2a4a}
.card .tag-high{color:#E67E22;background:#332200}
.card .desc{font-size:12px;color:#999;margin-top:4px;line-height:1.4}
.empty{text-align:center;padding:60px 20px;color:#666}
.empty .ico{font-size:44px;margin-bottom:12px}
.empty .hint{font-size:13px;line-height:1.8}
.bottom{text-align:center;padding:20px;color:#444;font-size:11px}
kbd{background:#333;color:#ddd;padding:1px 5px;border-radius:3px;font-family:'SF Mono',Menlo,monospace;font-size:11px}
mark{background:#E67E22;color:#fff;padding:0 2px;border-radius:2px}
.dot{color:#E67E22}
@media(max-width:500px){
  .card .top{flex-direction:column}
  .card .key{margin-left:0;margin-top:4px;display:inline-block}
}
</style>
</head>
<body>
<div class="header">
<h1><span>🎨</span> Blender 快捷键查询</h1>

</div>
</div>
<div class="cats" id="cfilters"></div>
<div class="hists" id="htags"></div>
<div class="meta"><span id="count"></span><span id="catLabel">全部</span></div>
<div class="results" id="results">
<div class="empty" id="empty">
<div class="ico">🔍</div>

</div>
<div id="resultsList"></div>
</div>

var CATS = ["通用操作","视图导航","选择操作","变换操作","编辑模式-建模","雕刻模式","UV编辑","着色-节点","动画-绑定","渲染"];
var CC = {"通用操作":"#4A90D9","视图导航":"#27AE60","选择操作":"#8E44AD","变换操作":"#E67E22","编辑模式-建模":"#E74C3C","雕刻模式":"#3498DB","UV编辑":"#1ABC9C","着色-节点":"#F39C12","动画-绑定":"#E91E63","渲染":"#C0392B"};

document.getElementById('totalCount').textContent = ALL.length;

// ═══ 拼音首字母提取 ═══
var P_INITIALS = ['zh','ch','sh','b','p','m','f','d','t','n','l','g','k','h','j','q','x','r','z','c','s','y','w'];
function getPyInit(py) {
  if (!py) return '';
  var r = '', i = 0;
  while (i < py.length) {
    var found = false;
    for (var j = 0; j < P_INITIALS.length; j++) {
      if (py.substring(i, i + P_INITIALS[j].length) === P_INITIALS[j]) {
        r += P_INITIALS[j][0]; i += P_INITIALS[j].length; found = true; break;
      }
    }
    if (!found) i++;
  }
  return r;
}
// 为每条快捷键预计算拼音首字母
ALL.forEach(function(s) { s._pi = getPyInit(PY[s.n]||''); });

// ═══ 状态 ═══
var S = { q: '', cat: null, hist: [] };
try { var h = localStorage.getItem('bl_html_hist'); if (h) S.hist = JSON.parse(h); } catch(e) {}

function esc(x) { return (x||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══ 搜索 ═══
function fuzzySearch(kw) {
  kw = kw.toLowerCase().trim();
  if (!kw) return [];
  var out = [];
  ALL.forEach(function(s) {
    var sc = 0;
    var nl = s.n.toLowerCase(), kl = s.k.toLowerCase(), dl = s.d.toLowerCase();
    var ml = s.m.toLowerCase(), cl = s.c.toLowerCase();
    var py = (PY[s.n]||'').toLowerCase();
    var pi = (s._pi||'');
    
    if (nl === kw) sc += 100;
    else if (nl.startsWith(kw)) sc += 85;
    else if (nl.includes(kw)) sc += 70;
    if (kl === kw) sc += 80;
    else if (kl.startsWith(kw)) sc += 65;
    else if (kl.includes(kw)) sc += 50;
    if (dl.includes(kw)) sc += 60;
    if (ml.includes(kw)) sc += 40;
    if (cl.includes(kw)) sc += 35;
    if (py === kw) sc += 50;
    else if (py.startsWith(kw)) sc += 40;
    else if (py.includes(kw)) sc += 30;
    // 拼音首字母
    if (pi === kw) sc += 35;
    else if (pi.startsWith(kw)) sc += 25;
    else if (pi.includes(kw)) sc += 15;
    
    var tokens = kw.split(/\s+/).filter(function(t){return t.length>0});
    if (tokens.length>1 && tokens.every(function(t){return nl.includes(t)||py.includes(t)||dl.includes(t)})) sc += 25;
    
    if (sc > 0) out.push({s:s, score:sc});
  });
  var fo = {high:3,medium:2,low:1};
  out.sort(function(a,b){return b.score-a.score||(fo[b.s.f]||0)-(fo[a.s.f]||0)});
  return out;
}

function doSearch() {
  var q = document.getElementById('q').value.trim();
  S.q = q;
  var rsList = document.getElementById('resultsList');
  var em = document.getElementById('empty');
  var countEl = document.getElementById('count');
  var catEl = document.getElementById('catLabel');

  var results;
  if (!q) {
    results = S.cat ? ALL.filter(function(s){return s.c===S.cat}) : ALL.slice(0, 30);
    catEl.textContent = S.cat || '全部';
    countEl.innerHTML = '<b>'+results.length+'</b> 条快捷键';
  } else {
    results = fuzzySearch(q);
    if (S.cat) results = results.filter(function(r){return r.s.c===S.cat});
    catEl.textContent = S.cat || '全部';
    countEl.innerHTML = results.length ? '找到 <b>'+results.length+'</b> 条' : '无匹配结果';
  }

  if (results.length===0) {
    em.style.display='block'; rsList.style.display='none';
  } else {
    em.style.display='none'; rsList.style.display='block';
    rsList.innerHTML = results.map(function(r){
      var s = r.s||r, color = CC[s.c]||'#4A90D9';
      var dot = s.f==='high'?'<span class="dot">● </span>':'';
      return '<div class="card" style="border-left-color:'+color+'">'
        + '<div class="top"><span class="name">'+dot+esc(s.n)+'</span><span class="key">'+esc(s.k)+'</span></div>'
        + '<div class="tags">'
          + '<span class="tag tag-cat">📁 '+esc(s.c)+'</span>'
          + '<span class="tag tag-mode">'+esc(s.m)+'</span>'
          + (s.f==='high'?'<span class="tag tag-high">● 高频</span>':'')
        + '</div>'
        + '<div class="desc">'+esc(s.d)+'</div>'
      + '</div>';
    }).join('');
    
    // 高亮匹配
    if (q) {
      var rx = new RegExp('('+q.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&')+')','gi');
      rsList.querySelectorAll('.name').forEach(function(el){
        el.innerHTML = el.textContent.replace(rx,'<mark>$1</mark>');
      });
    }
  }
}

// ═══ 历史 ═══
function saveHist(term) {
  if (!term) return;
  S.hist = S.hist.filter(function(x){return x!==term});
  S.hist.unshift(term);
  if (S.hist.length>20) S.hist=S.hist.slice(0,20);
  try{localStorage.setItem('bl_html_hist',JSON.stringify(S.hist))}catch(e){}
  renderHist();
}
function clearHist() { S.hist=[]; try{localStorage.removeItem('bl_html_hist')}catch(e){} renderHist(); }
function renderHist() {
  var h=S.hist.filter(function(x){return x}).slice(0,8);
  var el=document.getElementById('htags');
  el.innerHTML = h.map(function(t){return '<button data-term="'+esc(t)+'">'+esc(t)+'</button>'}).join('')
    + (h.length?'<button class="clear" id="clearHistBtn">清空</button>':'');
  el.querySelectorAll('button[data-term]').forEach(function(b){
    b.onclick=function(){clickHist(this.getAttribute('data-term'))};
  });
  var cb=document.getElementById('clearHistBtn');
  if(cb) cb.onclick=clearHist;
}
function clickHist(term) {
  document.getElementById('q').value=term;
  S.cat=null;
  renderCats();
  doSearch();
  saveHist(term);
  document.getElementById('q').focus();
}

// ═══ 分类 ═══
function renderCats() {
  var el=document.getElementById('cfilters');
  el.innerHTML = '<button class="'+(S.cat===null?'active':'')+'" data-cat="">全部</button>'
    + CATS.map(function(c){return '<button class="'+(S.cat===c?'active':'')+'" data-cat="'+esc(c)+'">'+esc(c)+'</button>'}).join('');
  el.querySelectorAll('button').forEach(function(b){
    b.onclick=function(){
      S.cat=this.getAttribute('data-cat')||null;
      renderCats();
      doSearch();
    };
  });
}

// ═══ 事件绑定 ═══
document.getElementById('q').addEventListener('input', doSearch);
document.getElementById('q').addEventListener('keydown', function(e){
  if(e.key==='Enter' && this.value.trim()) saveHist(this.value.trim());
  if(e.key==='Escape'){ this.value=''; S.cat=null; renderCats(); doSearch(); }
});
var saveTimer;
document.getElementById('q').addEventListener('keyup', function(){
  clearTimeout(saveTimer);
  if(this.value.trim()) saveTimer=setTimeout(function(){saveHist(document.getElementById('q').value.trim())},1500);
});

// ═══ 初始化 ═══
renderCats();
renderHist();
doSearch();
console.log('[Blender快捷键] 已就绪, '+ALL.length+' 条快捷键');
</script>
</body>
